<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Smart Poultry</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .welcome-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .welcome-container {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .welcome-card {
      background: #1b1b2b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    }

    .access-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(67,160,71,0.15);
      border: 1px solid rgba(67,160,71,0.35);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #81c784;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .access-badge .dot {
      width: 6px;
      height: 6px;
      background: #43a047;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.4); }
    }

    .welcome-card h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #e8f5e9;
      margin: 0 0 6px;
      letter-spacing: 0.3px;
    }

    .login-tagline {
      text-align: center;
      font-size: 12px;
      color: #81c784;
      margin: 0 0 24px;
      letter-spacing: 0.5px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 18px;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-wrap label {
      font-size: 12px;
      font-weight: 500;
      color: #90a4ae;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding-left: 2px;
    }

    .field-wrap input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 16px;
      color: #eee;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .field-wrap input::placeholder { color: #4a5568; }
    .field-wrap input:focus {
      border-color: #43a047;
      background: rgba(255,255,255,0.09);
    }

    .enter-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #2e7d32, #1565c0);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .enter-btn:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,125,50,0.35); }
    .enter-btn:active { transform: translateY(0); }
    .enter-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    #errorMsg {
      min-height: 20px;
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      border-radius: 8px;
      padding: 0;
      transition: all 0.2s;
    }
    #errorMsg:not(:empty) {
      padding: 10px 14px;
      background: rgba(255,60,60,0.1);
      color: #ff6b6b;
    }
    #errorMsg.success:not(:empty) {
      background: rgba(0,200,100,0.1);
      color: #00c864;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #94a3b8; }

    @media (max-width: 440px) {
      .welcome-card { padding: 36px 22px 28px; }
    }
  </style>
</head>
<body class="welcome-body">
  <div class="welcome-container">
    <div class="welcome-card">

      <div class="access-badge"><span class="dot"></span> Account Recovery</div>

      <h1>Reset your password</h1>
      <p class="login-tagline">Enter your email and we’ll send a reset link</p>

      <div class="field-group">
        <div class="field-wrap">
          <label for="resetEmail">Email Address</label>
          <input
            type="email"
            id="resetEmail"
            placeholder="e.g. manager@poultry.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <button class="enter-btn" id="sendResetBtn" onclick="sendReset()">
        Send reset link
      </button>

      <p id="errorMsg"></p>

      <a class="back-link" href="index.html">← Back to User-Login</a>
      <a class="back-link" href="admin.html">← Back to Admin-Login</a>
    </div>
  </div>

  <script type="module" src="reset-password.js"></script>
</body>
</html>
